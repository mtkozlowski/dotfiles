# First remove *all* keybindings
# unbind-key -a
# unbind-key C-o
# Now reinsert all the regular tmux keys
bind ^X lock-server
bind ^C new-window -c "$HOME"
bind C new-window -c "#{pane_current_path}"
bind ^D detach
bind * list-clients

bind H previous-window
bind L next-window

bind r command-prompt "rename-window %%"
bind R source-file ~/.config/tmux/tmux.conf
bind ^A last-window
bind a send-prefix
# After the prefix, Escape cancels back to root instead of falling through to
# the focused pane (e.g. interrupting Claude Code). Unbound prefix keys are
# otherwise re-dispatched in the root table and forwarded to the app.
bind -T prefix Escape switch-client -T root
bind ^W list-windows
bind w list-windows
bind z resize-pane -Z
bind ^L refresh-client
bind | split-window
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind '"' choose-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7
bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status
bind c kill-pane
bind x swap-pane -D
bind S choose-session
bind N command-prompt -p "new session name:" { new-session -d -s "%1" ; move-window -k -t "%1":1 }
bind K send-keys "clear"\; send-keys "Enter"
bind C-x command-prompt "send-keys %%"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind O send-keys C-o

bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key "w" run-shell "tmux select-window -t \"$(
  tmux list-windows -F '##{session_name}:##{window_index}  ##{window_name}##{?window_active, (active),}' | fzf-tmux -p 70%,60% \
    --no-sort --ansi --border-label ' windows ' --prompt '🪟  ' \
    --preview 'echo ▐ {2..}; echo; tmux capture-pane -ep -t {1}' \
    --preview-window 'right:55%' \
  | cut -d' ' -f1
)\""

# new window in a zoxide-picked dir (replaces sessionx C-y zo-new-window)
bind-key "C-y" run-shell "~/.config/tmux/scripts/new-window-zoxide.sh"

# lazygit in a popup, scoped to the current pane's directory
bind -N "lazygit (popup)" g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

bind -N "last-session (via sesh) " L run-shell "sesh last"
