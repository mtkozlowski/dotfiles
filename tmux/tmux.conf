source-file ~/.config/tmux/tmux.reset.conf
set-option -g default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',*256col*:RGB'

set -g prefix ^A
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
# set -g default-terminal "${TERM}"
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g @fzf-url-fzf-options '--tmux center,60%,30% --multi --exit-0 --no-preview --prompt=  --border-label=Open-URL'
# set -g @fzf-url-fzf-options "-p 60%,30% --prompt='   ' --border-label=' Open URL '"
set -g @fzf-url-history-limit '2000'

# On a headless host (e.g. attached over SSH to the VPS — no GUI, no browser),
# fzf-url's opener (open/xdg-open) has nothing to launch, so Enter silently fails
# into /tmp/tmux-$(id -u)-fzf-url.log. There: copy the picked URL to the system
# clipboard via OSC 52 instead (set-clipboard is on, so the buffer is forwarded
# to the local terminal/Mac), then paste or cmd-click it. macOS / any GUI host
# is left untouched and keeps native `open`.
if-shell '[ -z "$DISPLAY" ] && [ -z "$WAYLAND_DISPLAY" ] && ! command -v open >/dev/null 2>&1' \
  "set -g @fzf-url-open 'tmux set-buffer -w --'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# thumbs — vimium-style hint picker; prefix+space highlights URLs/paths/UUIDs/etc., type the hint to copy
set -g @plugin 'fcsonline/tmux-thumbs'
# Copy via `set-buffer -w` (OSC 52) instead of pbcopy: works both locally (Ghostty)
# and over SSH on the headless VPS (no pbcopy there), since set-clipboard is on and
# tmux forwards OSC 52 to the terminal, which writes the macOS clipboard.
# lowercase hint: copy match to tmux buffer + system clipboard
set -g @thumbs-command        'tmux set-buffer -w -- "{}" && tmux display-message "Copied {}"'
# uppercase hint: same as above, then paste the match at the current shell cursor
set -g @thumbs-upcase-command 'tmux set-buffer -w -- "{}" && tmux paste-buffer && tmux display-message "Copied {}"'
# multi-select (Enter to confirm): newline-join all picks and put them on the clipboard
set -g @thumbs-multi-command  'printf "%s\n" "{}" | tmux load-buffer -w - && tmux display-message "Copied multiple items"'
# extra match pattern: catches phrases like `claude --resume <UUID>` / `claude --continue <UUID>`
set -g @thumbs-regexp-1 'claude --[a-z]+ [0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'

set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/catppuccin-tmux' # My fork that holds the meetings script bc I'm lazy af
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# ## catppuccin theme
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{=25:#{b:pane_current_path}}"
# set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
# set -g @catppuccin_date_time_text "%H:%M"
set-hook -g client-dark-theme {
  set -g @catppuccin_flavour "frappe"
  set -g @catppuccin_reset "true"
  run ~/.config/tmux/plugins/catppuccin-tmux/catppuccin.tmux
}
set-hook -g client-light-theme {
  set -g @catppuccin_flavour "latte"
  set -g @catppuccin_reset "true"
  run ~/.config/tmux/plugins/catppuccin-tmux/catppuccin.tmux
}

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g automatic-rename-format '#{b:pane_current_path}'
set -g mouse on

run '~/.config/tmux/plugins/tpm/tpm'
